# PostgreSQL override — use alongside the base compose file:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up
services:
  liift:
    environment:
      DB_DRIVER: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-liift}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      DB_NAME: ${POSTGRES_DB:-liift}
      # SQLite vars not needed when using postgres, but harmless to leave
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-liift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-liift}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liift} -d ${POSTGRES_DB:-liift}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
